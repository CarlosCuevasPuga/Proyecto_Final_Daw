<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa - Passport Pal Motril</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <!-- LEAFLET (MAPA GRATIS) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <!-- ROUTING -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
</head>

<body>
    <!-- App Header -->
    <header class="app-header">
        <div class="logo">
            <img class="logo" src="./img/logo.png" alt="Logo PAPM"> PAPM
        </div>
        <div class="user-status" id="userStatus" style="display: none;">
            <div class="points">
                <i class='bx bxs-star'></i> <span id="userPoints">0</span> pts
            </div>
            <div class="profile-dropdown">
                <button class="profile-icon" onclick="showModal('profilePopup')">
                    <i class='bx bx-user-circle'></i>
                </button>
            </div>
        </div>
        <div class="auth-buttons" id="authButtons">
            <button class="btn btn-outline" onclick="showModal('loginModal')">Entrar</button>
        </div>
    </header>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class='bx bxs-home'></i>
            <span>Inicio</span>
        </a>
        <a href="mapa.html" class="nav-item active">
            <i class='bx bxs-map-alt'></i>
            <span>Mapa</span>
        </a>
        <a href="cupones.html" class="nav-item">
            <i class='bx bxs-coupon'></i>
            <span>Cupones</span>
        </a>
        <a href="premium.html" class="nav-item">
            <i class='bx bxs-crown'></i>
            <span>Premium</span>
        </a>
    </nav>

    <main class="app-content">
        <section class="section-container">
            <div class="section-header">
                <h2>Mapa de Rutas</h2>
            </div>

            <!-- MAPA REAL -->
            <div id="map" class= "map_container"></div>

        </section>
    </main>

    <!-- MODALS (sin tocar) -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('loginModal')">&times;</span>
            <h2>Iniciar Sesión</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Entrar</button>
            </form>
        </div>
    </div>

    <div class="modal" id="registerModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('registerModal')">&times;</span>
            <h2>Registro</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="regName" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="regPassword" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Crear Cuenta</button>
            </form>
        </div>
    </div>

    <!-- Welcome Popup -->
    <div class="modal welcome-popup" id="welcomePopup" onclick="closeModal('welcomePopup')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-modal" onclick="closeModal('welcomePopup')">&times;</span>
            <div class="welcome-popup-header">
                <i class='bx bxs-badge-check'></i>
                <h2>Bienvenido de nuevo</h2>
                <p id="welcomePopupName"></p>
            </div>
        </div>
    </div>

    <!-- Notification Popup -->
    <div class="modal notification-popup" id="notificationPopup" onclick="closeModal('notificationPopup')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-modal" onclick="closeModal('notificationPopup')">&times;</span>
            <div class="notification-popup-header">
                <i id="notificationIcon" class='bx bxs-info-circle'></i>
                <p id="notificationMessage"></p>
            </div>
        </div>
    </div>

    <!-- Profile Popup -->
    <div class="modal profile-popup" id="profilePopup" onclick="closeModal('profilePopup')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-modal" onclick="closeModal('profilePopup')">&times;</span>
            <div class="profile-popup-header">
                <i class='bx bxs-user-circle'></i>
                <h2>Perfil</h2>
                <p id="popupUserName"></p>
            </div>
            <div class="profile-popup-body">
                <div class="popup-info">
                    <span>Puntos</span>
                    <strong id="popupUserPoints">0</strong>
                </div>
                <div class="profile-popup-actions">
                    <a href="./perfil_usuario.html" class="btn btn-primary">Mi Perfil</a>
                    <a href="./cupones_usuario.html" class="btn btn-primary">Mis Cupones</a>
                    <button class="btn btn-outline btn-block" onclick="logout(); closeModal('profilePopup')">Cerrar Sesión</button>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

    <script src="./js/mapa.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
