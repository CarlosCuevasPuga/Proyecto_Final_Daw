<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa - Passport Pal Motril</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <!-- LEAFLET (MAPA GRATIS) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <!-- ROUTING -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
</head>

<body>

<!-- App Header -->
    <header class="app-header">
        <div class="logo">
            <img class="logo" src="./img/logo.png" alt="Logo PAPM"> PAPM
        </div>
        <div class="user-status" id="userStatus" style="display: none;">
            <div class="points">
                <i class='bx bxs-star'></i> <span id="userPoints">0</span> pts
            </div>
            <div class="profile-dropdown">
                <button class="profile-icon" onclick="toggleProfileMenu()">
                    <i class='bx bx-user-circle'></i>
                </button>
                <div class="dropdown-menu" id="profileMenu">
                    <div class="dropdown-item" onclick="viewProfile()">
                        <i class='bx bx-user'></i>
                        <span>Mi Perfil</span>
                    </div>
                    <div class="dropdown-item" onclick="logout()">
                        <i class='bx bx-log-out'></i>
                        <span>Cerrar Sesión</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="auth-buttons" id="authButtons">
            <button class="btn btn-outline" onclick="showModal('loginModal')">Entrar</button>
        </div>
    </header>

<main class="app-content">
    <section class="section-container">
        <div class="section-header">
            <h2>Mapa de Rutas</h2>
        </div>

        <!-- MAPA REAL -->
        <div id="map" style="width: 100%; height: 800px; border-radius: 12px;"></div>

    </section>
</main>

<nav class="bottom-nav">
    <a href="index.html" class="nav-item">
        <i class='bx bxs-home'></i>
        <span>Inicio</span>
    </a>
    <a href="mapa.html" class="nav-item active">
        <i class='bx bxs-map-alt'></i>
        <span>Mapa</span>
    </a>
    <a href="cupones.html" class="nav-item">
        <i class='bx bxs-coupon'></i>
        <span>Cupones</span>
    </a>
    <a href="premium.html" class="nav-item">
        <i class='bx bxs-crown'></i>
        <span>Premium</span>
    </a>
</nav>

<!-- MODALS (sin tocar) -->
<div class="modal" id="loginModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal('loginModal')">&times;</span>
        <h2>Iniciar Sesión</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="loginPassword" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Entrar</button>
        </form>
    </div>
</div>

<div class="modal" id="registerModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal('registerModal')">&times;</span>
        <h2>Registro</h2>
        <form id="registerForm">
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" id="regName" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="regPassword" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Crear Cuenta</button>
        </form>
    </div>
</div>

<!-- SCRIPTS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>
// Inicializar mapa
var map = L.map('map').setView([36.7450, -3.5160], 14);

// Capa base (OpenStreetMap GRATIS)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
}).addTo(map);

// Ruta de ejemplo (Motril)
L.Routing.control({
    waypoints: [
        L.latLng(36.7450, -3.5160),
        L.latLng(36.7465, -3.5175),
        L.latLng(36.7440, -3.5185)
    ],
    routeWhileDragging: false
}).addTo(map);
</script>

<script src="js/app.js"></script>
<script src="js/weather.js"></script>

</body>
</html>
